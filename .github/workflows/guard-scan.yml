name: Guard Scan

on:
  pull_request:
    paths:
      - ".prompts/**"

jobs:
  scan:
    name: Scan prompt files
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Scan prompt files
        run: python scripts/scan_prompts.py
        env:
          AEGISAI_GUARD_URL: ${{ secrets.AEGISAI_GUARD_URL }}
          AEGISAI_API_TOKEN: ${{ secrets.AEGISAI_API_TOKEN }}

      - name: Comment scan results on PR
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "Guard scan failed. Check guard-scan-report.json for details."